name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpha-factor-forge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: alpha-factor-forge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpha-factor-forge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: alpha-factor-forge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpha-factor-forge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: alpha-factor-forge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  cargo-check:
    name: cargo-check
    runs-on: windows-latest
    defaults:
      run:
        working-directory: alpha-factor-forge/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Tauri backend
        run: cargo check --locked

      - name: Run backend tests
        run: cargo test --locked

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpha-factor-forge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: alpha-factor-forge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E (chromium)
        run: npx playwright test
